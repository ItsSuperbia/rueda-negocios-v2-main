services:

  mongodb:
    image: mongo:8
    container_name: rueda-negocios-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend

    container_name: rueda-negocios-backend

    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend-next
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    
    container_name: rueda-negocios-frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - ./frontend-next/.env.local

    depends_on:
      - backend

volumes:
  mongodb_data: